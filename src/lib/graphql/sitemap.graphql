fragment sitemapPagesFields on Query {
  blogPostPageCollection(limit: 100, locale: $locale) {
    items {
      slug
      sys {
        publishedAt
      }
    }
  }
  pageCollection(limit: 1, locale: $locale) {
    items {
      sys {
        publishedAt
      }
    }
  }
}


query sitemapPages($locale: String!) {
  ...sitemapPagesFields
}
