query blogPostPageCollection(
  $locale: String
  $preview: Boolean
  $limit: Int
  $order: [BlogPostPageOrder]
  $where: BlogPostPageFilter
) {
  blogPostPageCollection(limit: $limit, locale: $locale, preview: $preview, order: $order where: $where) {
    items {
      ...BlogPostPageFields
    }
  }
}
